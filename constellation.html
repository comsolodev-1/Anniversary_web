<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Heart Constellation 💫</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="constellation.css"/>
</head>
<body>
  <canvas id="cn-canvas"></canvas>

  <div id="cn-content">
    <p class="cn-eyebrow">Hidden World · Two</p>
    <h1 class="cn-title">Heart<br><em>Constellation</em></h1>
    <p class="cn-hint" id="cn-hint">Drag the stars to form a heart — or let them find their way.</p>
  </div>

  <div id="cn-message">
    <p>"No matter how far apart we are,<br>every star still points me back to you."</p>
  </div>

  <div id="cn-controls">
    <button class="cn-btn" id="cn-form-heart" title="Form Heart">♡</button>
    <button class="cn-btn" id="cn-reset" title="Reset">↺</button>
  </div>

  <a href="secret.html" class="back-link">← Hidden World</a>
  <script src="constellation.js"></script>
</body>
</html>
