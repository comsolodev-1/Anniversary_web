<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hidden World ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="secret.css"/>
</head>
<body>
  <canvas id="hub-canvas"></canvas>

  <div id="hub-content">
    <p class="hub-eyebrow">Hidden World</p>
    <h1 class="hub-title">A Secret Garden</h1>
    <p class="hub-subtitle">Three worlds made just for you.</p>

    <div class="portals">
      <!-- Portal 1 -->
      <a href="playlist.html" class="portal" id="p1">
        <canvas class="portal-canvas" width="180" height="180"></canvas>
        <div class="portal-label">
          <span class="portal-icon">🎵</span>
          <span class="portal-name">Playlist of Us</span>
          <span class="portal-hint">our soundtrack</span>
        </div>
      </a>
      <!-- Portal 2 -->
      <a href="constellation.html" class="portal" id="p2">
        <canvas class="portal-canvas" width="180" height="180"></canvas>
        <div class="portal-label">
          <span class="portal-icon">💫</span>
          <span class="portal-name">Heart Constellation</span>
          <span class="portal-hint">draw our story</span>
        </div>
      </a>
      <!-- Portal 3 -->
      <a href="blooming.html" class="portal" id="p3">
        <canvas class="portal-canvas" width="180" height="180"></canvas>
        <div class="portal-label">
          <span class="portal-icon">🌸</span>
          <span class="portal-name">Blooming Future</span>
          <span class="portal-hint">our dreams ahead</span>
        </div>
      </a>
    </div>
  </div>

  <a href="final.html" class="back-link">← Back to Forever</a>
  <script src="secret.js"></script>

</html>
