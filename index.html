<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Happy Anniversary ❤️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="hero.css" />
</head>
<body>

  <section id="hero">

    <!-- Full-viewport canvas for particles -->
    <canvas id="hero-canvas"></canvas>

    <!-- LEFT: Text content -->
    <div id="hero-content" class="hero-content">
      <p class="hero-eyebrow">Happy Anniversary</p>
      <h1 class="hero-title">For You,<br><em>My Love</em></h1>
      <p class="hero-subtitle">
        Every chapter of my life<br />
        became beautiful when you<br />
        became part of the story.
      </p>
      <a href="flower.html" class="hero-cta">
        <span>Begin Our Journey</span>
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 3v10M3 8l5 5 5-5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </div>

    <!-- RIGHT: Hint label -->
    <div class="heart-hint">
      <span>drag · scroll to zoom</span>
    </div>

    <!-- Bottom scroll indicator -->
    <div class="scroll-hint">
      <span>scroll</span>
      <div class="scroll-line"></div>
    </div>

  </section>

  <script src="hero.js"></script>

</body>
</html>
